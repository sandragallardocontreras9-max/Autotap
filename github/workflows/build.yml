name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir el proyecto subido
        run: unzip -o AutoTapApp.zip

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma y build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Compilar APK (debug)
        working-directory: AutoTapApp
        run: gradle assembleDebug

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: AutoTap-apk
          path: AutoTapApp/app/build/outputs/apk/debug/app-debug.apk
