name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir el proyecto subido
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          unzip -o "$ZIP_FILE" -d ExtractedProject

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma y build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Compilar APK
        run: |
          echo "Contenido de la carpeta ExtractedProject:"
          find ExtractedProject -maxdepth 3
          
          GRADLE_PATH=$(find ExtractedProject -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLE_PATH" ]; then
            echo "¡ERROR CRÍTICO! No se encontró gradlew."
            exit 1
          fi
          
          echo "gradlew encontrado en: $GRADLE_PATH"
          PROJECT_DIR=$(dirname "$GRADLE_PATH")
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-apk
          # Busca el APK independientemente de la estructura de carpetas
          path: ExtractedProject/**/app/build/outputs/apk/debug/app-debug.apk
