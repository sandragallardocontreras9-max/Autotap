name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir el proyecto subido
        run: |
          # Busca cualquier archivo .zip en el repositorio y lo descomprime
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Descomprimiendo $ZIP_FILE..."
            unzip -o "$ZIP_FILE" -d ExtractedProject
          else
            echo "No se encontró ningún archivo .zip"
            exit 1
          fi

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma y build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Buscar código fuente y compilar
        run: |
          # Busca dónde está el archivo settings.gradle y compila ahí
          GRADLE_DIR=$(find ExtractedProject -name "settings.gradle" -exec dirname {} \;)
          if [ -n "$GRADLE_DIR" ]; then
            cd "$GRADLE_DIR"
            gradle assembleDebug
          else
            echo "Error: No se encontró el código dentro del zip"
            exit 1
          fi

      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-apk
          path: ExtractedProject/**/app/build/outputs/apk/debug/app-debug.apk
