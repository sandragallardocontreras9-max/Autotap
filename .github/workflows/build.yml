name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir el proyecto subido
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          unzip -o "$ZIP_FILE" -d ExtractedProject

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma y build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # Instalamos Gradle globalmente para no depender de archivos faltantes
      - name: Instalar Gradle
        uses: gradle/gradle-build-action@v3

      - name: Compilar APK
        run: |
          # Navegamos a la carpeta donde está settings.gradle
          PROJECT_DIR=$(find ExtractedProject -name "settings.gradle" -exec dirname {} \;)
          cd "$PROJECT_DIR"
          gradle assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker-apk
          path: ExtractedProject/**/app/build/outputs/apk/debug/app-debug.apk
